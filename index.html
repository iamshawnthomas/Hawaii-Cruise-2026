<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawaii Cruise 2026 Dashboard</title>
    <style>
        :root { --primary: #003580; --secondary: #e4002b; --sea: #e0f2f7; --port: #e8f5e9; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; color: var(--text); }
        header { background: var(--primary); color: white; padding: 1.5rem; text-align: center; border-bottom: 4px solid var(--secondary); }
        .container { display: flex; flex-wrap: wrap; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 10px; }
        #calendar { flex: 1; min-width: 320px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .day-card { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; position: relative; }
        .day-card:hover { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-color: var(--secondary); }
        .day-card.sea-day { background-color: var(--sea); }
        .day-card.port-day { background-color: var(--port); }
        .date-label { font-weight: bold; font-size: 0.95rem; color: var(--primary); display: block; }
        .times-label { font-size: 0.75rem; color: #666; font-weight: bold; margin-bottom: 5px; display: block; }
        .loc-label { display: block; font-size: 0.85rem; }
        #details { flex: 1.5; min-width: 350px; background: white; padding: 25px; border-radius: 8px; border: 1px solid #ddd; position: sticky; top: 20px; height: fit-content; line-height: 1.6; }
        .map-trigger { color: var(--primary); cursor: pointer; text-decoration: underline; display: block; margin-top: 12px; font-weight: bold; font-size: 1.05rem; }
        .map-trigger:hover { color: var(--secondary); }
        .history-box { display: none; background: #f0f7f4; border-left: 4px solid #004d40; padding: 12px; margin-top: 8px; font-size: 0.9rem; border-radius: 0 8px 8px 0; }
        .booking-btn { display: inline-block; background: #28a745; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; font-size: 0.8rem; margin-top: 10px; margin-right: 5px; }
        #map-container { margin-top: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #ccc; height: 350px; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
        .nav-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: var(--primary); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; text-align: center; }
        @media (max-width: 768px) { .container { flex-direction: column; } #details { position: static; } }
    </style>
</head>
<body>
<header>
    <h1>Carnival Radiance: Hawaii 2026</h1>
    <p>Shawn & Kim | Juan & Annette | Allen & Pattie</p>
</header>
<div class="container">
    <div id="calendar"></div>
    <div id="details">
        <h2 id="det-date">Select a day</h2>
        <h3 id="det-loc" style="color: var(--primary);">To see itinerary & history</h3>
        <div id="det-act"></div>
        <div id="map-container">
            <iframe id="map-frame" src=""></iframe>
            <a id="nav-link" class="nav-btn" target="_blank">Open Navigation in Google Maps</a>
        </div>
    </div>
</div>
<script>
    const cruiseData = [
        { date: "Apr 3", times: "Hotel Stay", location: "DFW -> Long Beach", type: "port", address: "Long Beach, CA", 
          activity: `<span class="map-trigger" onclick="toggleHistory('h-travel', 'Long Beach, CA')">Pre-Cruise Stay</span>
                     <div id="h-travel" class="history-box">1. Long Beach was once home to the Tongva people for over 10,000 years. 2. The 1933 Long Beach earthquake led to some of the first strict building codes in the US. 3. The city was once the "Navy Capital of the World" during WWII.</div>` 
        },
        { date: "Apr 4", times: "Depart: 4:00 PM", location: "Long Beach Terminal", type: "port", address: "231 Windsor Way, Long Beach, CA 90802", 
          activity: `<span class="map-trigger" onclick="toggleHistory('h-embark', '231 Windsor Way, Long Beach, CA 90802')">Embarkation Day</span>
                     <div id="h-embark" class="history-box">4. The Queen Mary next door is officially listed on the National Register of Historic Places. 5. The Carnival terminal dome was the filming location for parts of "Batman & Robin."</div>` 
        },
        { date: "Apr 5-8", times: "At Sea", location: "Pacific Crossing", type: "sea", activity: "6. The Pacific is the deepest ocean on Earth, containing the Mariana Trench. 7. Early explorers were surprised by how calm this ocean was, naming it 'Pacific' (peaceful)." },
        { date: "Apr 9", times: "10:00 AM - 9:30 PM", location: "Kahului (Maui), HI", type: "port", address: "200 Nohea Kai Dr, Lahaina, HI 96761",
          activity: `<span class="map-trigger" onclick="toggleHistory('h-luau', '200 Nohea Kai Dr, Lahaina, HI 96761')">Drums of the Pacific Lu'au</span>
                     <div id="h-luau" class="history-box">8. Maui is the only place in the US where you can find the Silversword plant. 9. Haleakalā volcano makes up 75% of the island. 10. Ancient Hawaiians used Kahului harbor as a major site for surfing and canoe racing.</div>` 
        },
        { date: "Apr 10", times: "9:00 AM - 10:00 PM", location: "Honolulu (Oahu), HI", type: "port", address: "1 Arizona Memorial Pl, Honolulu, HI 96818",
          activity: `<strong>10:00 AM Driver Pickup</strong><br>
                     <span class="map-trigger" onclick="toggleHistory('h-dole', '64-1550 Kamehameha Hwy, Wahiawa, HI 96786')">1. Dole Plantation</span>
                     <div id="h-dole" class="history-box">11. James Dole moved to Hawaii with just $1,200 and a vision for pineapples. 12. The "Dole Whip" was created in 1984 specifically for Disneyland.</div>
                     <span class="map-trigger" onclick="toggleHistory('h-coffee', '71-101 Kamehameha Hwy, Wahiawa, HI 96786')">2. Green World Coffee Farm</span>
                     <div id="h-coffee" class="history-box">13. The coffee here is picked by hand to ensure only ripe cherries are selected. 14. Coffee was first brought to Hawaii by a Spanish physician in 1813.</div>
                     <span class="map-trigger" onclick="toggleHistory('h-shrimp', '458 Keawe St, Honolulu, HI 96813')">3. Giovanni's Shrimp Truck (South Oahu Location)</span>
                     <div id="h-shrimp" class="history-box">15. Giovanni's was the first ever shrimp truck on the island, starting in 1993.</div>
                     <span class="map-trigger" onclick="toggleHistory('h-arizona', '1 Arizona Memorial Pl, Honolulu, HI 96818')">4. USS Arizona Memorial (1:45 PM)</span>
                     <div id="h-arizona" class="history-box">16. The marble wall in the Shrine Room lists names of all the personnel who perished. 17. The USS Missouri, where the war ended, sits just a few hundred yards away.</div>
                     <span class="map-trigger" onclick="toggleHistory('h-blowhole', '8483 Kalanianaole Hwy, Honolulu, HI 96825')">5. Halona Blowhole</span>
                     <div id="h-blowhole" class="history-box">18. This was the filming site for the famous beach scene in "From Here to Eternity." 19. Hālona means "lookout" in Hawaiian.</div>
                     <span class="map-trigger" onclick="toggleHistory('h-sunset', 'Waikiki Beach, HI')">6. Beach with Drinks</span>
                     <div id="h-sunset" class="history-box">20. Waikiki was once a swampy marshland used for growing taro and rice.</div>` 
        },
        { date: "Apr 11", times: "7:15 AM - 4:00 PM", location: "Nawiliwili (Kauai), HI", type: "port", address: "3-4131 Kuhio Hwy, Lihue, HI 96766",
          activity: `<strong>Shawn, Kim, Allen, Pattie:</strong> 
                     <span class="map-trigger" onclick="toggleHistory('h-tube', '3-4131 Kuhio Hwy, Lihue, HI 96766')">Kauai Backcountry Tubing</span>
                     <div id="h-tube" class="history-box">21. Kauai is the oldest of the main islands, estimated at 5 million years old.</div>
                     <a href="https://fareharbor.com/embeds/book/kauaibackcountry/items/1820/booking/53b1e9c4-9fd4-484a-9837-d5c2c9e1929e/" target="_blank" class="booking-btn">Ticket 1</a>
                     <a href="https://fareharbor.com/embeds/book/kauaibackcountry/items/1820/booking/290f7230-957c-445e-8503-24be8b7c4861/" target="_blank" class="booking-btn">Ticket 2</a><br><br>
                     <strong>Juan & Annette:</strong> 
                     <span class="map-trigger" onclick="toggleHistory('h-waimea', 'Waimea Canyon, HI')">Waimea Canyon Tour (Carnival Excursion)</span>
                     <div id="h-waimea" class="history-box">22. Mark Twain allegedly gave it the nickname "The Grand Canyon of the Pacific."</div>` 
        },
        { date: "Apr 12", times: "9:00 AM - 5:00 PM", location: "Hilo (Hawaii), HI", type: "port", address: "80 Kuhio St, Hilo, HI 96720",
          activity: `<span class="map-trigger" onclick="toggleHistory('h-falls', 'Rainbow Falls, Hilo, HI 96720')">1. Rainbow Falls</span>
                     <div id="h-falls" class="history-box">23. The Wailuku River, which feeds the falls, is the longest river in Hawaii.</div>
                     <span class="map-trigger" onclick="toggleHistory('h-volcano', 'Hawaii Volcanoes National Park, HI')">2. Volcano National Park (Hawaii Belt Rd)</span>
                     <div id="h-volcano" class="history-box">24. The park is a UNESCO World Heritage site and an International Biosphere Reserve.</div>
                     <span class="map-trigger" onclick="toggleHistory('h-lunch', '126 Keawe St, Hilo, HI 96720')">3. Lunch: Pineapples Island Fresh Cuisine</span>
                     <span class="map-trigger" onclick="toggleHistory('h-beach', 'Carlsmith Beach Park, Hilo, HI 96720')">4. Carlsmith Beach Park</span>
                     <div id="h-beach" class="history-box">25. Hilo is known as the "Orchid Capital of the World" due to its lush tropical environment.</div>` 
        },
        { date: "Apr 13-17", times: "At Sea / Mexico", location: "Return Leg", type: "sea", activity: "Final chance to enjoy the sea air as we approach Mexico." },
        { date: "Apr 18", times: "Arrive: 8:00 AM", location: "Long Beach, CA", type: "port", address: "231 Windsor Way, Long Beach, CA 90802", activity: "Disembarkation day." }
    ];

    const calendarEl = document.getElementById('calendar');
    cruiseData.forEach((day, index) => {
        const card = document.createElement('div');
        card.className = `day-card ${day.type}-day`;
        card.innerHTML = `<span class="date-label">${day.date}</span><span class="times-label">${day.times}</span><span class="loc-label">${day.location}</span>`;
        card.onclick = () => showDetails(index);
        calendarEl.appendChild(card);
    });

    function showDetails(index) {
        const day = cruiseData[index];
        document.getElementById('det-date').innerText = day.date;
        document.getElementById('det-loc').innerText = day.location;
        document.getElementById('det-act').innerHTML = day.activity;
        if (day.address) { updateMap(day.address); } else { document.getElementById('map-container').style.display = 'none'; }
    }

    function toggleHistory(id, address) {
        const box = document.getElementById(id);
        const isVisible = box.style.display === "block";
        document.querySelectorAll('.history-box').forEach(b => b.style.display = 'none');
        if (!isVisible) { box.style.display = "block"; }
        updateMap(address);
    }

    function updateMap(address) {
        const encoded = encodeURIComponent(address);
        document.getElementById('map-frame').src = `https://www.google.com/maps/embed/v1/place?key=REPLACE_WITH_YOUR_KEY&q=${encoded}`;
        document.getElementById('nav-link').href = `https://www.google.com/maps/dir/?api=1&destination=${encoded}`;
        document.getElementById('map-container').style.display = 'block';
    }
</script>
</body>
</html>
