<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawaii Cruise 2026 Dashboard</title>
    <style>
        :root { --primary: #003580; --secondary: #e4002b; --sea: #e0f2f7; --port: #e8f5e9; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; color: var(--text); }
        header { background: var(--primary); color: white; padding: 1.5rem; text-align: center; border-bottom: 4px solid var(--secondary); }
        .container { display: flex; flex-wrap: wrap; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 10px; }
        #calendar { flex: 1; min-width: 320px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .day-card { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; position: relative; }
        .day-card:hover { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-color: var(--secondary); }
        .day-card.sea-day { background-color: var(--sea); }
        .day-card.port-day { background-color: var(--port); }
        .date-label { font-weight: bold; font-size: 0.95rem; color: var(--primary); display: block; }
        .times-label { font-size: 0.75rem; color: #666; font-weight: bold; margin-bottom: 5px; display: block; }
        .loc-label { display: block; font-size: 0.85rem; }
        #details { flex: 1.5; min-width: 350px; background: white; padding: 25px; border-radius: 8px; border: 1px solid #ddd; position: sticky; top: 20px; height: fit-content; line-height: 1.6; }
        .map-trigger { color: var(--primary); cursor: pointer; text-decoration: underline; display: block; margin-top: 10px; font-weight: bold; font-size: 1.05rem; }
        .map-trigger:hover { color: var(--secondary); }
        .history-box { display: none; background: #f0f7f4; border-left: 4px solid #004d40; padding: 15px; margin-top: 10px; font-size: 0.9rem; border-radius: 0 8px 8px 0; overflow-y: auto; max-height: 450px; }
        .history-box h4 { margin-top: 0; color: #004d40; border-bottom: 1px solid #c8e6c9; padding-bottom: 5px; }
        .fact-list { list-style: none; padding: 0; margin: 0; }
        .booking-btn { display: inline-block; background: #28a745; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px; font-size: 0.85rem; margin-top: 10px; margin-right: 5px; font-weight: bold; }
        .nav-btn { display: inline-block; margin-top: 15px; padding: 12px 24px; background: var(--primary); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; text-align: center; width: 100%; box-sizing: border-box; transition: 0.3s; }
        .nav-btn:hover { background: var(--secondary); }
        @media (max-width: 768px) { .container { flex-direction: column; } #details { position: static; } }
    </style>
</head>
<body>
<header>
    <h1>Carnival Radiance: Hawaii 2026</h1>
    <p>Shawn & Kim | Juan & Annette | Allen & Pattie</p>
</header>
<div class="container">
    <div id="calendar"></div>
    <div id="details">
        <h2 id="det-date">Select a day</h2>
        <h3 id="det-loc" style="color: var(--primary);">To see itinerary & Fun Facts</h3>
        <div id="det-act"></div>
        <div id="map-section" style="display:none; margin-top:20px;">
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">Selected Destination Map:</p>
            <a id="nav-link" class="nav-btn" target="_blank">Open Navigation in Google Maps</a>
        </div>
    </div>
</div>
<script>
    const cruiseData = [
        { date: "Apr 3", times: "Hotel Stay", location: "DFW -> Long Beach", type: "port", address: "Long Beach, CA", activity: "Travel day and pre-cruise stay." },
        { date: "Apr 4", times: "Depart: 4:00 PM", location: "Long Beach Terminal", type: "port", address: "231 Windsor Way, Long Beach, CA 90802", activity: "Embarkation Day!" },
        { date: "Apr 5-8", times: "At Sea", location: "Pacific Crossing", type: "sea", activity: "Relaxing days at sea." },
        { date: "Apr 9", times: "10:00 AM - 9:30 PM", location: "Kahului (Maui), HI", type: "port", address: "200 Nohea Kai Dr, Lahaina, HI 96761",
          activity: `<span class="map-trigger" onclick="updateNav('200 Nohea Kai Dr, Lahaina, HI 96761'); toggleHistory('h-maui')">Maui Itinerary & Fun Facts</span>
                     <div id="h-maui" class="history-box"><h4>Maui Facts & History</h4><ul class="fact-list">
                     * Maui is named after the demigod who pulled the islands from the sea.<br>* It is the second-largest Hawaiian island.<br>* Lahaina was the capital of the Kingdom of Hawaii from 1820 to 1845.<br>* The Banyan tree in Lahaina is one of the largest in the world.<br>* Maui’s nickname is "The Valley Isle."<br>* Haleakalā means "House of the Sun."<br>* Over 10,000 humpback whales migrate to Maui's waters every winter.<br>* The Road to Hana has 620 curves and 59 bridges.<br>* Maui has over 120 miles of coastline.<br>* Honokohau Falls is the tallest waterfall on Maui at 1,119 feet.<br>* The island was formed by two shield volcanoes.<br>* Maui has 30 miles of white, red, and black sand beaches.<br>* The pineapple was once the island's major export.<br>* Charles Lindbergh is buried on Maui's east side.<br>* The "Iao Needle" is a 1,200-foot natural rock pinnacle.<br>* Maui produces more sugar than any other island.<br>* The Maui onion is famous for being sweet enough to eat raw.<br>* Molokini crater is a world-class snorkeling site.<br>* The "Seven Sacred Pools" are actually 24 pools.<br>* Surfing was a sport of Hawaiian royalty in Maui.<br>* Maui has the highest concentration of endangered species in the US.<br>* Kapalua means "arms embracing the sea."<br>* Maui was the first island to have a library.<br>* The island has its own winery at Ulupalakua.<br>* Makawao is a famous "Cowboy Town" on Maui.</ul></div>` 
        },
        { date: "Apr 10", times: "9:00 AM - 10:00 PM", location: "Honolulu (Oahu), HI", type: "port", address: "1 Arizona Memorial Pl, Honolulu, HI 96818",
          activity: `<strong>10:00 AM Driver Pickup</strong><br>
                     <span class="map-trigger" onclick="updateNav('64-1550 Kamehameha Hwy, Wahiawa, HI 96786')">Dole Plantation</span>
                     <span class="map-trigger" onclick="updateNav('71-101 Kamehameha Hwy, Wahiawa, HI 96786')">Green Coffee Farm</span>
                     <span class="map-trigger" onclick="updateNav('458 Keawe St, Honolulu, HI 96813')">Shrimp Truck (Giovanni's Kaka'ako)</span>
                     <span class="map-trigger" onclick="updateNav('1 Arizona Memorial Pl, Honolulu, HI 96818')">USS Arizona (1:45 PM)</span>
                     <span class="map-trigger" onclick="updateNav('8483 Kalanianaole Hwy, Honolulu, HI 96825')">Halona Blow Hole</span>
                     <span class="map-trigger" onclick="updateNav('Waikiki, HI')">Beach with drinks</span>
                     <div class="history-box" style="display:block; margin-top:20px;"><h4>Oahu Facts & History</h4><ul class="fact-list">
                     * Oahu's nickname is "The Gathering Place."<br>* It is home to Iolani Palace, the only royal palace in the US.<br>* Pearl Harbor is named for the pearl oysters that once grew there.<br>* Honolulu means "sheltered harbor."<br>* Waikiki was once a retreat for Hawaiian royalty.<br>* The Aloha Tower was once the tallest building in Hawaii.<br>* Oahu has the largest population of the islands.<br>* Duke Kahanamoku, the father of modern surfing, lived here.<br>* Diamond Head is actually a volcanic tuff cone.<br>* The North Shore is the surfing capital of the world.<br>* Over 100 movies have been filmed at Kualoa Ranch.<br>* "Hawaii Five-O" was filmed entirely on Oahu.<br>* Punchbowl Crater is a national cemetery.<br>* The USS Arizona Memorial was built in 1962.<br>* Oahu was the first island to have a paved road.<br>* The Foster Botanical Garden is the oldest in Hawaii.<br>* Tantalus Lookout offers the best view of the Honolulu skyline.<br>* Nu'uanu Pali is the site of a major 1795 battle.<br>* Hawaii’s first post office was in Honolulu.<br>* Shave ice was brought to Oahu by Japanese immigrants.<br>* The H-3 freeway is the most expensive highway per mile ever built.<br>* Oahu has more than 125 beaches.<br>* Hanauma Bay is a marine life conservation district.<br>* King Kamehameha I united the islands after the Battle of Nu'uanu.<br>* The surfing "Triple Crown" is held annually on Oahu.</ul></div>` 
        },
        { date: "Apr 11", times: "7:15 AM - 4:00 PM", location: "Nawiliwili (Kauai), HI", type: "port", address: "3-4131 Kuhio Hwy, Lihue, HI 96766",
          activity: `<strong>Shawn, Kim, Allen, Pattie:</strong> 
                     <span class="map-trigger" onclick="updateNav('3-4131 Kuhio Hwy, Lihue, HI 96766')">Tube Adventure</span>
                     <a href="https://fareharbor.com/embeds/book/kauaibackcountry/items/1820/booking/53b1e9c4-9fd4-484a-9837-d5c2c9e1929e/" target="_blank" class="booking-btn">Ticket 1</a>
                     <a href="https://fareharbor.com/embeds/book/kauaibackcountry/items/1820/booking/290f7230-957c-445e-8503-24be8b7c4861/" target="_blank" class="booking-btn">Ticket 2</a><br><br>
                     <strong>Juan & Annette:</strong> 
                     <span class="map-trigger" onclick="updateNav('Waimea Canyon, HI')">Waimea Canyon Tour (Carnival)</span>
                     <div class="history-box" style="display:block; margin-top:20px;"><h4>Kauai Facts & History</h4><ul class="fact-list">
                     * Kauai is the oldest Hawaiian island at 5.1 million years.<br>* Nickname: "The Garden Isle."<br>* Mount Waialeale is one of the wettest spots on Earth.<br>* Waimea Canyon is the "Grand Canyon of the Pacific."<br>* No building on Kauai can be taller than a palm tree by law.<br>* Kauai was the only island not conquered by Kamehameha.<br>* The island is famous for its wild chickens.<br>* Jurassic Park was filmed in the Na Pali coast valleys.<br>* Only 10% of the island is accessible by car.<br>* The first sugar plantation in Hawaii was in Koloa.<br>* Poipu Beach is home to endangered Monk Seals.<br>* Kauai has more miles of hiking trails than any other island.<br>* The Spouting Horn is a natural blowhole near Poipu.<br>* The Hanalei Pier was built in 1892.<br>* Kauai has the only navigable rivers in Hawaii.<br>* The Wailua River is sacred to ancient Hawaiians.<br>* The "Sleeping Giant" is a famous mountain ridge.<br>* Kauai produces more coffee than any other US island.<br>* Captain Cook first landed in Hawaii at Waimea, Kauai.<br>* The island is the westernmost of the main islands.<br>* Lihue is the island's commercial center.<br>* The Na Pali coast has cliffs rising 4,000 feet.<br>* Kauai has been the setting for over 60 Hollywood films.<br>* The Menehune are legendary small people of Kauai.<br>* All Kauai beaches are open to the public.</ul></div>` 
        },
        { date: "Apr 12", times: "9:00 AM - 5:00 PM", location: "Hilo (Hawaii), HI", type: "port", address: "80 Kuhio St, Hilo, HI 96720",
          activity: `<strong>Itinerary:</strong><br>
                     <span class="map-trigger" onclick="updateNav('Rainbow Falls, Hilo, HI 96720')">Rainbow Falls</span>
                     <span class="map-trigger" onclick="updateNav('Hawaii Volcanoes National Park, HI')">Volcano National Park</span>
                     <span class="map-trigger" onclick="updateNav('126 Keawe St, Hilo, HI 96720')">Lunch: Pineapples Fresh Cuisine</span>
                     <span class="map-trigger" onclick="updateNav('Carlsmith Beach Park, Hilo, HI 96720')">Carlsmith Beach Park</span>
                     <div class="history-box" style="display:block; margin-top:20px;"><h4>Big Island (Hilo) Facts</h4><ul class="fact-list">
                     * It is twice the size of all other islands combined.<br>* It has 10 of the world's 14 climate zones.<br>* Mauna Kea is the tallest mountain from base to peak.<br>* Kilauea has been erupting nearly continuously since 1983.<br>* Hilo is the wettest city in the US.<br>* The Merrie Monarch hula festival is held in Hilo.<br>* Big Island grows 100% of US-produced macadamia nuts.<br>* King Kamehameha the Great was born on this island.<br>* The island is still growing due to lava flows.<br>* Punalu'u is one of the most famous black sand beaches.<br>* Captain Cook died at Kealakekua Bay.<br>* The island has snow-capped mountains and tropical beaches.<br>* Kona coffee is only grown on the western slopes.<br>* Hilo was hit by major tsunamis in 1946 and 1960.<br>* The "Painted Church" features murals from the 1800s.<br>* Mauna Loa is the largest active volcano on Earth.<br>* The island has green sand beaches made of olivine.<br>* Hilo’s Liliʻuokalani Gardens is the largest Japanese garden outside Japan.<br>* Hawaii Volcanoes National Park is a World Heritage site.<br>* The island has the world's most massive volcano.<br>* Cattle ranching is a huge industry (Parker Ranch).<br>* Hilo was once a major sugar-producing town.<br>* You can see the stars better here than almost anywhere on Earth.<br>* Ka Lae is the southernmost point in the US.<br>* The island has ancient petroglyphs carved in lava.</ul></div>` 
        },
        { date: "Apr 17", times: "9:00 AM - 5:00 PM", location: "Ensenada, Mexico", type: "port", address: "Ensenada Cruiseport, Mexico",
          activity: `<span class="map-trigger" onclick="updateNav('Ensenada, Mexico'); toggleHistory('h-mex')">Mexico Itinerary & Fun Facts</span>
                     <div id="h-mex" class="history-box"><h4>Ensenada & Mexico Facts</h4><ul class="fact-list">
                     * Ensenada is known as the "Cinderella of the Pacific."<br>* The Margarita was reportedly invented here at Hussong’s Cantina.<br>* La Bufadora is one of the largest sea blowholes in the world.<br>* Ensenada is the only deep-water port in Baja California.<br>* Mexico is the most populous Spanish-speaking country.<br>* Ensenada is a "City of Knowledge" for its science labs.<br>* The region is famous for the Baja 1000 off-road race.<br>* Ensenada is the birthplace of the fish taco.<br>* Mexico has 34 UNESCO World Heritage sites.<br>* The Valle de Guadalupe produces 90% of Mexico's wine.<br>* Mexico City is sinking at a rate of 10 inches per year.<br>* Ensenada was founded in 1542 by Juan Rodriguez Cabrillo.<br>* Mexico is home to the world's smallest volcano.<br>* The Great Pyramid of Cholula is larger than the Great Pyramid of Giza.<br>* Ensenada is a major stop for whale watching.<br>* Popcorn was first domesticated in Mexico.<br>* Mexico introduced chocolate, corn, and chilies to the world.<br>* The city has a massive 150-foot flagpole.<br>* Ensenada is famous for surfing at Todos Santos Island.<br>* Mexico is the crossroads of Spanish and Indigenous cultures.<br>* Ensenada’s coastline is over 500 miles long.<br>* The Riviera del Pacifico was a glamorous 1930s casino.<br>* Mexico has 68 official languages.<br>* Chichen Itza is one of the New Seven Wonders of the World.<br>* Ensenada is just 70 miles south of the US border.</ul></div>` 
        },
        { date: "Apr 18", times: "Arrive: 8:00 AM", location: "Long Beach, CA", type: "port", address: "231 Windsor Way, Long Beach, CA 90802", activity: "Disembarkation day." }
    ];

    const calendarEl = document.getElementById('calendar');
    cruiseData.forEach((day, index) => {
        const card = document.createElement('div');
        card.className = `day-card ${day.type}-day`;
        card.innerHTML = `<span class="date-label">${day.date}</span><span class="times-label">${day.times}</span><span class="loc-label">${day.location}</span>`;
        card.onclick = () => showDetails(index);
        calendarEl.appendChild(card);
    });

    function showDetails(index) {
        const day = cruiseData[index];
        document.getElementById('det-date').innerText = day.date;
        document.getElementById('det-loc').innerText = day.location;
        document.getElementById('det-act').innerHTML = day.activity;
        if (day.address) { 
            document.getElementById('map-section').style.display = 'block';
            updateNav(day.address);
        } else { 
            document.getElementById('map-section').style.display = 'none'; 
        }
    }

    function toggleHistory(id) {
        const box = document.getElementById(id);
        box.style.display = (box.style.display === "block") ? "none" : "block";
    }

    function updateNav(address) {
        const link = document.getElementById('nav-link');
        link.href = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(address)}`;
        // Highlight the button briefly so user knows it updated
        link.style.background = 'var(--secondary)';
        setTimeout(() => { link.style.background = 'var(--primary)'; }, 500);
    }
</script>
</body>
</html>
