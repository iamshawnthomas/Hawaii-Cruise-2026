<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawaii Cruise 2026 Dashboard</title>
    <style>
        :root {
            --primary: #003580; /* Carnival Blue */
            --secondary: #e4002b; /* Carnival Red */
            --sea: #e0f2f7;
            --port: #e8f5e9;
            --text: #333;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; color: var(--text); }
        header { background: var(--primary); color: white; padding: 1.5rem; text-align: center; border-bottom: 4px solid var(--secondary); }
        
        .container { display: flex; flex-wrap: wrap; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 10px; }
        
        /* Calendar Grid */
        #calendar { flex: 1; min-width: 320px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .day-card { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .day-card:hover { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-color: var(--secondary); }
        .day-card.sea-day { background-color: var(--sea); }
        .day-card.port-day { background-color: var(--port); }
        .date-label { font-weight: bold; font-size: 0.9rem; color: var(--primary); }
        .loc-label { display: block; margin-top: 5px; font-size: 0.85rem; }

        /* Detail Pane */
        #details { flex: 1.5; min-width: 350px; background: white; padding: 25px; border-radius: 8px; border: 1px solid #ddd; position: sticky; top: 20px; height: fit-content; line-height: 1.6; }
        #det-act { font-size: 0.95rem; }
        
        /* Interactive Elements */
        .map-trigger { color: var(--primary); cursor: pointer; text-decoration: underline; display: block; margin-top: 15px; font-weight: bold; font-size: 1.1rem; }
        .map-trigger:hover { color: var(--secondary); }
        .history-section { background: #f9f9f9; border-left: 4px solid #009688; padding: 15px; margin-top: 20px; font-style: italic; font-size: 0.9rem; border-radius: 0 8px 8px 0; }
        .history-title { font-weight: bold; display: block; margin-bottom: 5px; color: #00796b; font-style: normal; }

        #map-container { margin-top: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #ccc; height: 350px; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .directions-link { display: inline-block; margin-top: 10px; padding: 10px 20px; background: var(--primary); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            #details { position: static; }
        }
    </style>
</head>
<body>

<header>
    <h1>Carnival Radiance: Hawaii 2026</h1>
    <p>April 4th - April 18th | First Island Voyage</p>
</header>

<div class="container">
    <div id="calendar">
        </div>

    <div id="details">
        <h2 id="det-date">Select a day</h2>
        <h3 id="det-loc" style="color: var(--primary);">To see itinerary & maps</h3>
        <div id="det-act"></div>
        <div id="map-container">
            <iframe id="map-frame" src=""></iframe>
            <a id="dir-link" class="directions-link" target="_blank">Open GPS Navigation</a>
        </div>
    </div>
</div>

<script>
    const cruiseData = [
        { 
            date: "Apr 3", location: "DFW -> Long Beach", type: "port", address: "Long Beach, CA", 
            activity: "Travel day! Flying from DFW to Long Beach for a pre-cruise hotel stay." 
        },
        { 
            date: "Apr 4", location: "Long Beach, CA", type: "port", address: "231 Windsor Way, Long Beach, CA 90802", 
            activity: "Embarkation Day. The ship departs at 4:00 PM. Welcome Aboard!" 
        },
        { 
            date: "Apr 5-8", location: "Pacific Crossing", type: "sea", 
            activity: "Four relaxing days at sea as we cross the Pacific toward the islands." 
        },
        { 
            date: "Apr 9", 
            location: "Kahului (Maui), HI", 
            type: "port", 
            address: "200 Nohea Kai Dr, Lahaina, HI 96761",
            activity: `
                <span class="map-trigger" onclick="updateMap('200 Nohea Kai Dr, Lahaina, HI 96761')">Drums of the Pacific Lu'au (Hyatt Regency Maui)</span>
                Enjoy the longest-running show on the islands with traditional Polynesian dance and fire knives.
                <div class="history-section">
                    <span class="history-title">Maui History Fact:</span>
                    Maui is named after the demigod Maui, who legend says pulled the Hawaiian islands from the sea with a giant fishhook. During your drive to the Lu'au, you'll be traveling through the West Maui mountains, which were formed by a massive shield volcano that collapsed over a million years ago.
                </div>
            `
        },
        { 
            date: "Apr 10", 
            location: "Honolulu (Oahu), HI", 
            type: "port", 
            address: "1 Arizona Memorial Pl, Honolulu, HI 96818",
            activity: `
                <strong>Private Driver Pickup: 11:00 AM</strong><br>
                <span class="map-trigger" onclick="updateMap('1 Arizona Memorial Pl, Honolulu, HI 96818')">1. USS Arizona Memorial (1:45 PM)</span>
                <span class="map-trigger" onclick="updateMap('64-1550 Kamehameha Hwy, Wahiawa, HI 96786')">2. Dole Plantation & Coffee Farm</span>
                <span class="map-trigger" onclick="updateMap('89-400 Keaulana Ave, Waianae, HI 96792')">3. Mermaid Caves & Sunset Drinks</span>
                <div class="history-section">
                    <span class="history-title">Oahu History Fact:</span>
                    Oahu is known as 'The Gathering Place.' It is home to 'Iolani Palace, the only royal palace in the United States. Also, keep an eye on the mountains—the dramatic cliffs (Pali) were the site of the Battle of Nu'uanu, where King Kamehameha I finally unified the islands in 1795.
                </div>
            `
        },
        { 
            date: "Apr 11", 
            location: "Nawiliwili (Kauai), HI", 
            type: "port", 
            address: "Kanoa Rd, Lihue, HI 96766", 
            activity: `
                Arrival 7:15 AM - Departure 4:00 PM.
                <span class="map-trigger" onclick="updateMap('Wailua Falls, Lihue, HI 96766')">Wailua Falls (Nearby Landmark)</span>
                <div class="history-section">
                    <span class="history-title">Kauai History Fact:</span>
                    Kauai is the oldest of the main islands (over 5 million years old). It's the only island that King Kamehameha never conquered by force; he eventually gained it through a peaceful treaty. Look for the 'Menehune' fishpond—legend says it was built in a single night by a race of mythical small people.
                </div>
            `
        },
        { 
            date: "Apr 12", 
            location: "Hilo (Big Island), HI", 
            type: "port", 
            address: "80 Kuhio St, Hilo, HI 96720", 
            activity: `
                Arrival 9:00 AM - Departure 5:00 PM.
                <span class="map-trigger" onclick="updateMap('Rainbow Falls, Hilo, HI 96720')">Rainbow Falls (Nearby Landmark)</span>
                <div class="history-section">
                    <span class="history-title">Hilo History Fact:</span>
                    Hilo is the 'Tsunami Capital of the World.' Because of its bay's shape, it was hit hard in 1946 and 1960. You'll notice much of the downtown area is now parks—this is because the city rebuilt on higher ground and turned the most dangerous spots into beautiful green spaces.
                </div>
            `
        },
        { 
            date: "Apr 13-16", location: "At Sea", type: "sea", 
            activity: "Four more days at sea as we head back toward North America." 
        },
        { 
            date: "Apr 17", 
            location: "Ensenada, Mexico", 
            type: "port", 
            address: "Blvd. Teniente Azueta 110, Ensenada, B.C., Mexico", 
            activity: "Afternoon stop in Mexico. Arrival 3:00 PM - Departure 8:00 PM." 
        },
        { 
            date: "Apr 18", 
            location: "Long Beach, CA", 
            type: "port", 
            address: "231 Windsor Way, Long Beach, CA 90802", 
            activity: "Disembarkation. Safe travels back to DFW!" 
        }
    ];

    const calendarEl = document.getElementById('calendar');

    cruiseData.forEach((day, index) => {
        const card = document.createElement('div');
        card.className = `day-card ${day.type}-day`;
        card.innerHTML = `<span class="date-label">${day.date}</span><span class="loc-label">${day.location}</span>`;
        card.onclick = () => showDetails(index);
        calendarEl.appendChild(card);
    });

    function showDetails(index) {
        const day = cruiseData[index];
        document.getElementById('det-date').innerText = day.date;
        document.getElementById('det-loc').innerText = day.location;
        document.getElementById('det-act').innerHTML = day.activity;
        
        if (day.address) {
            updateMap(day.address);
        } else {
            document.getElementById('map-container').style.display = 'none';
        }

        if(window.innerWidth < 768) {
            document.getElementById('details').scrollIntoView({behavior: "smooth"});
        }
    }

    function updateMap(address) {
        const encodedAddress = encodeURIComponent(address);
        document.getElementById('map-frame').src = `https://maps.google.com/maps?q=${encodedAddress}&t=&z=14&ie=UTF8&iwloc=&output=embed`;
        document.getElementById('dir-link').href = `https://www.google.com/maps/dir/?api=1&destination=${encodedAddress}`;
        document.getElementById('map-container').style.display = 'block';
    }
</script>

</body>
</html>
